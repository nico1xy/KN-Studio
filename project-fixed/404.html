<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Seite nicht gefunden – KN-Studio</title>
<meta name="robots" content="noindex"/>
<link rel="stylesheet" href="css/fonts.css"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Inter',sans-serif;
    background:#070910;color:#EEF0FF;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    text-align:center;padding:24px;
  }
  .wrap{max-width:420px}
  .code{
    font-family:'Space Grotesk',sans-serif;font-weight:700;
    font-size:5rem;letter-spacing:-.03em;
    background:linear-gradient(90deg,#6C63FF,#00E5FF);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    line-height:1;margin-bottom:16px;
  }
  h1{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;margin-bottom:12px}
  p{color:rgba(238,240,255,.6);margin-bottom:32px;line-height:1.6}
  a{
    display:inline-block;background:#6C63FF;color:#fff;
    padding:13px 28px;border-radius:6px;text-decoration:none;
    font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.9rem;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Diese Seite existiert nicht</h1>
    <p>Der Link, dem Sie gefolgt sind, führt leider ins Leere. Vielleicht wurde die Seite verschoben oder existiert nicht mehr.</p>
    <a href="/">Zurück zur Startseite</a>
  </div>
</body>
</html>
