<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AGB – KN-Studio</title>
<meta name="robots" content="noindex"/>
<link rel="stylesheet" href="../css/fonts.css"/>
<link rel="stylesheet" href="legal.css" />
<script>
  (function () {
    var saved = localStorage.getItem('kn-theme');
    var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
  })();
</script>
<style>
  :root { --accent:#6C63FF; --bg:#070910; --ink:#EEF0FF; --ink-dim:rgba(238,240,255,.62); --line:rgba(238,240,255,.1); --surf:#0C0E16; }
  :root[data-theme="light"] { --bg:#F7F8FC; --ink:#11131C; --ink-dim:rgba(17,19,28,.62); --line:rgba(17,19,28,.1); --surf:#FFFFFF; --accent:#5B52E8; }
  body { background: var(--bg); color: var(--ink); transition: background-color .35s, color .35s; }
  .legal-page { background: var(--bg); }
  h1, h2 { color: var(--ink) !important; }
  p, a.legal-back { color: var(--ink-dim) !important; }
  a { color: var(--accent) !important; }
  .legal-note { border-top-color: var(--line) !important; color: var(--ink-dim) !important; }
  .theme-btn {
    position: fixed; top: 18px; right: 18px;
    width: 42px; height: 42px; border-radius: 50%;
    border: 1px solid var(--line); background: var(--surf);
    color: var(--ink); font-size: 1.1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.15); z-index: 999;
    transition: background .3s, border-color .3s;
  }
  .theme-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
</style>
</head>
<body>
<button class="theme-btn" id="legalTheme" aria-label="Hell/Dunkel umschalten" title="Hell/Dunkel umschalten">☀️</button>
<script>
  (function(){
    var btn = document.getElementById('legalTheme');
    function sync() {
      var light = document.documentElement.getAttribute('data-theme') === 'light';
      btn.textContent = light ? '🌙' : '☀️';
    }
    sync();
    btn.addEventListener('click', function(){
      var light = document.documentElement.getAttribute('data-theme') === 'light';
      if (light) {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('kn-theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
        localStorage.setItem('kn-theme', 'light');
      }
      sync();
    });
  })();
</script>

<div class="legal-page">
  <a href="/" class="legal-back">← Zurück zur Startseite</a>

  <h1>Allgemeine Geschäftsbedingungen</h1>

</div>

</body>
</html>
